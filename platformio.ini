; reticulum-lora-transport
; ------------------------
; Clean-room C++ RNS Transport node. Spec-pinned to
; ../reticulum-specifications/. Test-vector-driven via
; pio test -e native.
;
; v0.1 reintroduces the board layer per `board_layer_phasing.md`
; memory — link forwarding (PR 8) was the gating trigger and is now
; in. The Faketec env is the bring-up target; other boards
; (RAK4631 / XIAO_nRF52840 / Heltec_T114 / RAK3401) land per board
; in subsequent PRs as their carry-over headers come back.

[platformio]
default_envs = native

[env]
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

; ---------------------------------------------------------------------
; native — host-side unit tests pinned to reticulum-specifications/
; test-vectors/. Crypto primitives come from rweather/Crypto. Only
; RNG.cpp in that library pulls in <Arduino.h>, and we never call any
; RNG functions — so we add an Arduino.h shim under
; support/native_compat/ to let RNG.cpp compile, then PlatformIO's
; static-archive default discards the unreferenced RNG.o at link time.
; lib_compat_mode=off lets the Arduino-tagged Crypto lib build at all.
; ---------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_filter = native/*
build_flags =
    ${env.build_flags}
    -DNATIVE_BUILD
    -Isupport/native_compat
build_src_filter =
    +<*>
    -<main.cpp>        ; Arduino setup/loop entry, ifdef-guarded but excluded for cleanliness
    -<Radio.cpp>       ; SX1262 driver — Arduino + RadioLib only, irrelevant on host
    -<Storage.cpp>     ; Adafruit_LittleFS / InternalFS, Arduino-only
    -<ConfigStore.cpp> ; depends on Storage; pure-C++ but pulls Storage.cpp's symbols
lib_deps =
    rweather/Crypto @ ^0.4.0
lib_compat_mode = off
test_build_src = true

; ---------------------------------------------------------------------
; native_san — same as native, plus AddressSanitizer + UBSan. CI runs
; this env; local dev can use plain `native` (sanitizers on Windows
; MinGW are flaky). Sanitizer flags must be on both compile and link,
; which `build_flags` covers for the native platform.
; ---------------------------------------------------------------------
[env:native_san]
extends = env:native
build_flags =
    ${env:native.build_flags}
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
    -g

; ---------------------------------------------------------------------
; Faketec — Nice!Nano-style nRF52840 ProMicro clone + Ebyte E22-900M30S
; (SX1262, TCXO, external RF switch). Pin map + board quirks live in
; include/board/Faketec.h, pre-included for every src TU via
; `-include`. This is the bring-up target; CI doesn't build it yet
; because the Arduino-nrf52 platform install is heavy and the firmware
; isn't useful until LoRaInterface + Radio.cpp land. Local dev runs
; `pio run -e Faketec`; CI is added in a follow-up PR.
; ---------------------------------------------------------------------
; Common nRF52840 + SX1262 build flag profile, factored out so the
; per-board envs only differ on board= and the -include line.
[nrf52_common]
platform = nordicnrf52
framework = arduino
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
upload_protocol = nrfutil
monitor_speed = 115200
build_unflags =
    ${env.build_unflags}
    -fno-exceptions
    -fno-rtti
    --specs=nano.specs
build_flags =
    ${env.build_flags}
    -fexceptions
    -frtti
    --specs=nosys.specs
lib_deps =
    rweather/Crypto @ ^0.4.0
    jgromes/RadioLib @ ^7.3.0

[env:Faketec]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_Faketec
    -include include/board/Faketec.h

; ---------------------------------------------------------------------
; RAK4631 — WisBlock Core nRF52840 + integrated SX1262.
; Pin map in include/board/rak4631.h. Uses pca10056 pin numbering
; (board = nrf52840_dk_adafruit) — same convention as Faketec, so
; Radio.cpp / LoRaInterface stay board-agnostic.
; ---------------------------------------------------------------------
[env:RAK4631]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_RAK4631
    -include include/board/rak4631.h

; ---------------------------------------------------------------------
; XIAO_nRF52840 — Seeed XIAO nRF52840 Kit + Wio-SX1262 daughter.
; Uses a CUSTOM board JSON (boards/xiao_nrf52840.json) with S140 v7.3.0
; fwid and linker script at 0x27000 — required because the XIAO ships
; with SoftDevice v7.3.0 while nrf52840_dk_adafruit targets v6.1.1
; (app would land at the wrong offset). The custom linker file
; (linker/nrf52840_s140_v7.ld) lays out the nRF52's 1 MB flash with
; S140 v7 in mind.
; ---------------------------------------------------------------------
[env:XIAO_nRF52840]
extends = nrf52_common
board = xiao_nrf52840
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_XIAO_NRF52840
    -include include/board/xiao_nrf52840.h

; ---------------------------------------------------------------------
; Heltec_T114 — Heltec Mesh Node T114 (nRF52840 + SX1262 + TFT).
; Pin map in include/board/heltec_t114.h.
; ---------------------------------------------------------------------
[env:Heltec_T114]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_HELTEC_T114
    -include include/board/heltec_t114.h

; ---------------------------------------------------------------------
; RAK3401 — RAK3401 1W variant (WisBlock nRF52840 + SX1262 + 1W PA).
; Same pin family as RAK4631 with PA enable / RF switch wiring quirks
; in the board header.
; ---------------------------------------------------------------------
[env:RAK3401]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_RAK3401
    -include include/board/rak3401.h
