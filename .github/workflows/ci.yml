name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  native-tests:
    name: Native unit tests (ASAN+UBSAN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO state
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run native tests under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:symbolize=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: pio test -e native_san -v

  firmware-build:
    name: Firmware build — ${{ matrix.board }} (nRF52840 + SX1262)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # release-on-tag step needs to publish to GitHub Releases
    strategy:
      fail-fast: false   # one board failing shouldn't mask the others
      matrix:
        # All three are nRF52840 + SX1262 + Adafruit nRF52 bootloader,
        # so the same UF2 family ID (0xADA52840) and conversion command
        # work for every board. Adding RAK3401 / Heltec_T114 is just
        # appending the env name here once their board headers are in.
        board: [ProMicroDIY, XIAO_nRF52840, RAK4631]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO state
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build ${{ matrix.board }} firmware
        # Validates that the spec layer (src/rns/*) compiles cleanly
        # under arduino-nrf52 with exceptions+rtti enabled, and that
        # main.cpp + Radio.cpp + LoRaInterface link into a firmware
        # binary against the per-board pin map. No hardware
        # involvement; just verifies the build graph is intact.
        run: pio run -e ${{ matrix.board }}

      - name: Convert hex to UF2
        # Family ID 0xADA52840 = "Adafruit nRF52840" — what the
        # Adafruit nRF52 bootloader (which ships on Nice!Nano clones,
        # XIAO nRF52840, RAK4631, Heltec T114, etc.) accepts on the
        # USB mass-storage drag-and-drop interface. uf2conv.py is
        # Microsoft's canonical converter; recent versions read the
        # family table from a sibling uf2families.json, so we fetch
        # both. The script has a built-in Intel HEX parser so no
        # extra Python deps are needed.
        run: |
          curl -fsSL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py    -o uf2conv.py
          curl -fsSL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o uf2families.json
          python uf2conv.py -c -f 0xADA52840 -o firmware-${{ matrix.board }}.uf2 .pio/build/${{ matrix.board }}/firmware.hex

      - name: Upload UF2 as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: firmware-${{ matrix.board }}.uf2
          if-no-files-found: error

      - name: Stage tagged release asset
        # On tag push only — copy to a versioned filename so the
        # Release page shows e.g. firmware-XIAO_nRF52840-v0.1.5.uf2.
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp firmware-${{ matrix.board }}.uf2 firmware-${{ matrix.board }}-${{ github.ref_name }}.uf2

      - name: Publish GitHub Release
        # softprops/action-gh-release is idempotent across concurrent
        # matrix runs targeting the same tag — the first run creates
        # the release, subsequent ones just append their files.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-${{ matrix.board }}-${{ github.ref_name }}.uf2
          fail_on_unmatched_files: true
          generate_release_notes: true
