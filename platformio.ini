; reticulum-lora-transport
; ------------------------
; Clean-room C++ RNS Transport node. Spec-pinned to
; ../reticulum-specifications/. Test-vector-driven via
; pio test -e native.
;
; v0.0 ships only the native test env. Board envs (Faketec, RAK4631,
; etc.) land as the spec implementation reaches each layer — when
; tests/native/test_transport passes, the firmware glue is wired up
; and the board envs come back. Until then there is nothing to flash.

[platformio]
default_envs = native

[env]
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

; ---------------------------------------------------------------------
; native — host-side unit tests pinned to reticulum-specifications/
; test-vectors/. Crypto primitives come from rweather/Crypto. Only
; RNG.cpp in that library pulls in <Arduino.h>, and we never call any
; RNG functions — so we add an Arduino.h shim under
; support/native_compat/ to let RNG.cpp compile, then PlatformIO's
; static-archive default discards the unreferenced RNG.o at link time.
; lib_compat_mode=off lets the Arduino-tagged Crypto lib build at all.
; ---------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_filter = native/*
build_flags =
    ${env.build_flags}
    -DNATIVE_BUILD
    -Isupport/native_compat
lib_deps =
    rweather/Crypto @ ^0.4.0
lib_compat_mode = off
test_build_src = true

; ---------------------------------------------------------------------
; native_san — same as native, plus AddressSanitizer + UBSan. CI runs
; this env; local dev can use plain `native` (sanitizers on Windows
; MinGW are flaky). Sanitizer flags must be on both compile and link,
; which `build_flags` covers for the native platform.
; ---------------------------------------------------------------------
[env:native_san]
extends = env:native
build_flags =
    ${env:native.build_flags}
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
    -g
