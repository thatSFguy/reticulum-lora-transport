; reticulum-lora-transport
; ------------------------
; Clean-room C++ RNS Transport node. Spec-pinned to
; ../reticulum-specifications/. Test-vector-driven via
; pio test -e native.
;
; v0.0 ships only the native test env. Board envs (Faketec, RAK4631,
; etc.) land as the spec implementation reaches each layer — when
; tests/native/test_transport passes, the firmware glue is wired up
; and the board envs come back. Until then there is nothing to flash.

[platformio]
default_envs = native

[env]
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

; ---------------------------------------------------------------------
; native — host-side unit tests pinned to reticulum-specifications/
; test-vectors/. Crypto primitives come from rweather/Crypto, which is
; portable C++ (only RNG.cpp pulls in Arduino — we don't need it for
; deterministic test-vector validation, so it's compiled out via
; -DCRYPTO_RNG_DEFAULT=0).
; ---------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_filter = native/*
build_flags =
    ${env.build_flags}
    -DNATIVE_BUILD
lib_deps =
    rweather/Crypto @ ^0.4.0
lib_compat_mode = off
test_build_src = true
