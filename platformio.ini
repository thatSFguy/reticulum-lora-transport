; reticulum-lora-transport
; ------------------------
; Clean-room C++ RNS Transport node. Spec-pinned to
; ../reticulum-specifications/. Test-vector-driven via
; pio test -e native.
;
; v0.1 reintroduces the board layer per `board_layer_phasing.md`
; memory — link forwarding (PR 8) was the gating trigger and is now
; in. The Faketec env is the bring-up target; other boards
; (RAK4631 / XIAO_nRF52840 / Heltec_T114 / RAK3401) land per board
; in subsequent PRs as their carry-over headers come back.

[platformio]
default_envs = native

[env]
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

; ---------------------------------------------------------------------
; native — host-side unit tests pinned to reticulum-specifications/
; test-vectors/. Crypto primitives come from rweather/Crypto. Only
; RNG.cpp in that library pulls in <Arduino.h>, and we never call any
; RNG functions — so we add an Arduino.h shim under
; support/native_compat/ to let RNG.cpp compile, then PlatformIO's
; static-archive default discards the unreferenced RNG.o at link time.
; lib_compat_mode=off lets the Arduino-tagged Crypto lib build at all.
; ---------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_filter = native/*
build_flags =
    ${env.build_flags}
    -DNATIVE_BUILD
    -Isupport/native_compat
build_src_filter =
    +<*>
    -<main.cpp>        ; Arduino setup/loop entry, ifdef-guarded but excluded for cleanliness
    -<Radio.cpp>       ; SX1262 driver — Arduino + RadioLib only, irrelevant on host
    -<Storage.cpp>     ; Adafruit_LittleFS / InternalFS, Arduino-only
    -<ConfigStore.cpp> ; depends on Storage; pure-C++ but pulls Storage.cpp's symbols
lib_deps =
    rweather/Crypto @ ^0.4.0
lib_compat_mode = off
test_build_src = true

; ---------------------------------------------------------------------
; native_san — same as native, plus AddressSanitizer + UBSan. CI runs
; this env; local dev can use plain `native` (sanitizers on Windows
; MinGW are flaky). Sanitizer flags must be on both compile and link,
; which `build_flags` covers for the native platform.
; ---------------------------------------------------------------------
[env:native_san]
extends = env:native
build_flags =
    ${env:native.build_flags}
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
    -g

; ---------------------------------------------------------------------
; Faketec — Nice!Nano-style nRF52840 ProMicro clone + Ebyte E22-900M30S
; (SX1262, TCXO, external RF switch). Pin map + board quirks live in
; include/board/Faketec.h, pre-included for every src TU via
; `-include`. This is the bring-up target; CI doesn't build it yet
; because the Arduino-nrf52 platform install is heavy and the firmware
; isn't useful until LoRaInterface + Radio.cpp land. Local dev runs
; `pio run -e Faketec`; CI is added in a follow-up PR.
; ---------------------------------------------------------------------
[env:Faketec]
platform = nordicnrf52
board = nrf52840_dk_adafruit
framework = arduino
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
upload_protocol = nrfutil
monitor_speed = 115200
build_unflags =
    ${env.build_unflags}
    -fno-exceptions
    -fno-rtti
    --specs=nano.specs
build_flags =
    ${env.build_flags}
    -fexceptions
    -frtti
    --specs=nosys.specs
    -DBOARD_MODEL=BOARD_Faketec
    -include include/board/Faketec.h
lib_deps =
    rweather/Crypto @ ^0.4.0
    jgromes/RadioLib @ ^7.3.0
